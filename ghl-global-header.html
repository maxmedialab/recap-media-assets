<!-- Preloader — covers the page while CDN CSS/JS loads -->
<style>
    #rm-splash { position: fixed; inset: 0; z-index: 99999; background: #0C0A10; display: flex; align-items: center; justify-content: center; transition: opacity 0.45s ease; }
    #rm-splash.hidden { opacity: 0; pointer-events: none; }
    #rm-splash img { width: 120px; height: auto; animation: rm-pulse 1.2s ease-in-out infinite; }
    @keyframes rm-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.96)} }
</style>
<div id="rm-splash">
    <img src="https://assets.cdn.filesafe.space/K9u6cepBq4hbudcnIkVw/media/69ca37ed027b158238eeb120.png" alt="Loading Recap Media">
</div>

<!-- Custom cursor elements (required for cursor JS to work) -->
<div class="cursor-dot" id="cur-dot"></div>
<div class="cursor-ring" id="cur-ring"></div>

<!-- Grain texture overlay -->
<div class="grain" aria-hidden="true">
    <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <filter id="grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#grain-filter)"/>
    </svg>
</div>
